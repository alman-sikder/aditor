<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Icon: film strip + play button -->
  <rect x="2" y="8" width="32" height="32" rx="7" fill="url(#grad1)"/>
  <!-- Film strip holes -->
  <rect x="5" y="11" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="5" y="19" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="5" y="27" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="27" y="11" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="27" y="19" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="27" y="27" width="4" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Play triangle -->
  <polygon points="14,16 14,32 26,24" fill="white"/>
  <!-- Text: Aditor -->
  <text x="42" y="33" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="white">Ad</text>
  <text x="68" y="33" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="300" fill="url(#grad2)">itor</text>
</svg>
